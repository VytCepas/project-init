name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Sync dev dependencies
        run: uv sync --extra dev --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest) — parallel mode
        # Falls back to single-threaded if xdist not available
        run: uv run pytest -n auto --tb=short -q 2>/dev/null || uv run pytest --tb=short -q

  wheel-smoke:
    name: Wheel smoke test
    runs-on: ubuntu-24.04
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Build wheel
        run: uv build --wheel

      - name: Install wheel into a fresh venv and run scaffolder
        run: |
          set -euo pipefail
          uv venv /tmp/smoke-venv
          # shellcheck disable=SC1091
          source /tmp/smoke-venv/bin/activate
          uv pip install --quiet dist/*.whl
          mkdir -p /tmp/smoke-target
          project-init /tmp/smoke-target \
            --non-interactive \
            --preset obsidian-only \
            --name smoke \
            --description "wheel smoke test" \
            --language python \
            --strict
          # Verify essentials exist
          test -f /tmp/smoke-target/.claude/config.yaml
          test -f /tmp/smoke-target/.claude/project-init.md
          test -f /tmp/smoke-target/CLAUDE.md
          test -f /tmp/smoke-target/AGENTS.md
          # Verify hook executable bits survived packaging
          test -x /tmp/smoke-target/.claude/hooks/post-edit-lint.sh
          test -x /tmp/smoke-target/.claude/hooks/pre-commit-gate.sh
          test -x /tmp/smoke-target/.claude/hooks/bash-safety-guard.sh
          # Verify no surviving {{...}} placeholders (--strict already guarantees this)
          ! grep -rn '{{[a-z_]*}}' /tmp/smoke-target || (echo "Unrendered placeholders found"; exit 1)
          echo "OK - wheel smoke test passed"
