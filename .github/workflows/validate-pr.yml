name: Validate PR

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  pr-title:
    name: Check PR title format
    runs-on: ubuntu-24.04
    steps:
      - name: Validate title format with type
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Canonical: Conventional Commits with issue key as scope (ADR-006).
          # Legacy bracket format accepted during transition.
          NEW_FORMAT='^(feat|fix|chore|docs|test)(\([A-Z][A-Z0-9]{1,9}-[0-9]+\))?!?: .+'
          LEGACY_FORMAT='^\[([A-Z][A-Z0-9]{1,9}-[0-9]+|nojira)\]\[(feat|fix|chore|docs|test)\]'
          if echo "$PR_TITLE" | grep -qE "$NEW_FORMAT"; then
            echo "PR title format OK (conventional): $PR_TITLE"
          elif echo "$PR_TITLE" | grep -qE "$LEGACY_FORMAT"; then
            echo "PR title format OK (legacy, prefer type(KEY-N): ...): $PR_TITLE"
          else
            echo "ERROR: PR title must match: type(PROJECT-123): description  (or type: description for no-issue work)"
            echo "Valid types: feat, fix, chore, docs, test"
            echo "Examples:"
            echo "  feat(PI-42): Add OAuth login"
            echo "  fix(PI-99): Handle null pointer in auth"
            echo "  fix: Fix typo in README"
            exit 1
          fi

  closes-keyword:
    name: Check for Closes keyword in PR body
    runs-on: ubuntu-24.04
    steps:
      - name: Validate Closes keyword
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          # No-issue PRs: legacy [nojira] prefix, or conventional title without a scope.
          # An issue-linked branch must not bypass the Closes check via a scopeless title.
          if echo "$PR_TITLE" | grep -qE '^\[nojira\]|^(feat|fix|chore|docs|test)!?: '; then
            if echo "$PR_BRANCH" | grep -qE '^(feat|fix|chore|docs|test)/[A-Z][A-Z0-9]{1,9}-[0-9]+-'; then
              echo "ERROR: branch $PR_BRANCH is issue-linked — title must carry the issue key as scope, e.g. type(KEY-N): description"
              exit 1
            fi
            echo "no-issue PR — skipping Closes keyword check"
            exit 0
          fi
          # For issue PRs, require Closes keyword
          if echo "$PR_BODY" | grep -qiE 'closes\s+#[0-9]+'; then
            echo "Closes keyword found"
          else
            echo "ERROR: PR body must include 'Closes #<number>' to auto-close the linked issue"
            exit 1
          fi

          # Extract the issue key from the title scope, e.g. fix(PI-7): ... -> PI-7.
          TITLE_KEY=$(echo "$PR_TITLE" | sed -nE 's/.*\(([A-Z][A-Z0-9]*-[0-9]+)\).*/\1/p')
          TITLE_KEY_NUM=$(echo "$TITLE_KEY" | grep -oE '[0-9]+$' || true)

          # Defense in depth: when the branch is *also* issue-linked, its key must
          # match the title scope key. Otherwise a PR on branch fix/PI-99-* with
          # title fix(PI-1): ... + body "Closes #1" passes every other check while
          # closing the wrong issue off the wrong branch (PI-200 review).
          BRANCH_KEY_NUM=$(echo "$PR_BRANCH" | sed -nE 's#^(feat|fix|chore|docs|test)/[A-Z][A-Z0-9]*-([0-9]+)-.*#\2#p')
          if [ -n "$TITLE_KEY_NUM" ] && [ -n "$BRANCH_KEY_NUM" ] && [ "$TITLE_KEY_NUM" != "$BRANCH_KEY_NUM" ]; then
            echo "ERROR: branch issue key (#$BRANCH_KEY_NUM) and title scope key ($TITLE_KEY -> #$TITLE_KEY_NUM) reference different issues."
            echo "Rename the branch or fix the title so both point at the same issue."
            exit 1
          fi

          # Verify the title scope key number is among the Closes numbers — a
          # type(PI-N): ... PR must Closes #N (PI-N maps to issue #N), so it
          # can't auto-close an unrelated issue (PI-200).
          if [ -n "$TITLE_KEY_NUM" ]; then
            CLOSES_NUMS=$(echo "$PR_BODY" | grep -oiE 'closes\s+#[0-9]+' | grep -oE '[0-9]+' || true)
            if echo "$CLOSES_NUMS" | grep -qx "$TITLE_KEY_NUM"; then
              echo "Closes #$TITLE_KEY_NUM matches the title scope key $TITLE_KEY"
            else
              echo "ERROR: title scope key $TITLE_KEY (#$TITLE_KEY_NUM) is not among the Closes numbers: $(echo $CLOSES_NUMS | tr '\n' ' ')"
              echo "A '$TITLE_KEY' PR must 'Closes #$TITLE_KEY_NUM' — PI-N maps to issue #N."
              exit 1
            fi
          fi
