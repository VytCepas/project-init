name: Docs
description: Documentation addition or correction
labels: [documentation]
body:
  - type: textarea
    id: scope
    attributes:
      label: What needs documenting?
      description: Which behavior, workflow, or decision needs clearer documentation?
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Audience
      description: Who needs this documentation?
      placeholder: "Users, maintainers, agents, contributors, operators..."
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [high, medium, low, unset]
      default: 3
  - type: input
    id: area
    attributes:
      label: Area / component
      placeholder: "e.g. install, scaffold, templates, scripts, ci"
  - type: input
    id: parent
    attributes:
      label: Parent issue
      description: Use #N (same repo) or owner/repo#N (cross-repo).
      placeholder: "#42 or VytCepas/other-repo#7"
  - type: textarea
    id: references
    attributes:
      label: References
      description: Related issues, PRs, ADRs, files, or external links
  - type: dropdown
    id: agent_ready
    attributes:
      label: Agent ready
      description: Can an AI agent implement this without human clarification?
      options: ["Yes", "No"]
      default: 1
  - type: dropdown
    id: confidence
    attributes:
      label: Confidence
      description: How well-understood is the scope and approach?
      options: [high, medium, low, unknown]
      default: 3
