name: Test
description: Missing or insufficient test coverage
labels: [test]
body:
  - type: textarea
    id: behavior
    attributes:
      label: What behavior needs coverage?
      description: Describe the behavior, template, script, or workflow that needs tests.
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: What regression or bug could slip through without this test?
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Suggested approach
      placeholder: "Unit test, scaffold-output diff, CLI test, workflow validation..."
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [high, medium, low, unset]
      default: 3
  - type: input
    id: area
    attributes:
      label: Area / component
      placeholder: "e.g. scaffold, templates, scripts, ci"
  - type: input
    id: parent
    attributes:
      label: Parent issue
      description: Use #N (same repo) or owner/repo#N (cross-repo).
      placeholder: "#42 or VytCepas/other-repo#7"
  - type: dropdown
    id: agent_ready
    attributes:
      label: Agent ready
      description: Can an AI agent implement this without human clarification?
      options: ["Yes", "No"]
      default: 1
  - type: dropdown
    id: confidence
    attributes:
      label: Confidence
      description: How well-understood is the scope and approach?
      options: [high, medium, low, unknown]
      default: 3
