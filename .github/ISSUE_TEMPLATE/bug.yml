name: Bug
description: Something is broken
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `project-init /tmp/test --preset obsidian-only ...`
        2. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [high, medium, low, unset]
      default: 3
  - type: input
    id: area
    attributes:
      label: Area / component
      placeholder: "e.g. auth, scaffold, templates, ci"
  - type: input
    id: source_project
    attributes:
      label: Source project
      description: If this bug was reported from another project or repo, record it here.
      placeholder: "owner/repo or owner/repo#N"
  - type: input
    id: parent
    attributes:
      label: Parent issue
      description: If this bug is tracked under a larger epic. Use #N or owner/repo#N.
      placeholder: "#42 or VytCepas/other-repo#7"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, project-init version"
  - type: dropdown
    id: agent_ready
    attributes:
      label: Agent ready
      description: Can an AI agent implement this without human clarification?
      options: ["Yes", "No"]
      default: 1
  - type: dropdown
    id: confidence
    attributes:
      label: Confidence
      description: How well-understood is the scope and approach?
      options: [high, medium, low, unknown]
      default: 3
