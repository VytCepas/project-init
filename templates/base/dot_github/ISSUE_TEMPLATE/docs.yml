name: Docs
description: Documentation addition or correction
labels: [documentation]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [high, medium, low]
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area
      placeholder: docs, product, devops, frontend, backend
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options: [XS, S, M, L, XL]
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: What needs documenting?
      description: Which behavior, workflow, or decision needs clearer documentation?
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Audience
      description: Who needs this documentation?
      placeholder: "Users, maintainers, agents, contributors, operators..."
  - type: textarea
    id: references
    attributes:
      label: References
      description: Related issues, PRs, ADRs, files, or external links
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Blocked-by, parent, or follow-up relationships.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: ready
    attributes:
      label: Definition of Ready
      placeholder: What must be true before implementation starts?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of Done
      placeholder: What must be true before this can close?
    validations:
      required: true
